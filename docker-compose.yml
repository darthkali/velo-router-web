version: '3.8'

services:
  # BRouter Routing Engine
  brouter:
    image: ghcr.io/nrenner/brouter:latest
    container_name: velo-brouter
    ports:
      - '17777:17777'
    volumes:
      # Segment files - download from https://brouter.de/brouter/segments4/
      - ./data/segments4:/segments4
      # Custom routing profiles
      - ./data/profiles2:/profiles2
    environment:
      - JAVA_OPTS=-Xmx512m -Xms128m
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:17777/brouter/status"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Angular Frontend (Production)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: velo-frontend
    ports:
      - '8080:80'
    depends_on:
      - brouter
    restart: unless-stopped

networks:
  default:
    name: velo-network
